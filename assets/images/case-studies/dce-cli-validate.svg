<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <rect width="1200" height="900" rx="40" fill="#F4ECE0"/>
  <rect x="48" y="48" width="1104" height="804" rx="34" fill="#FBF7F1" stroke="#DCCDB8" stroke-width="2"/>
  <text x="84" y="110" fill="#1E2B4A" font-size="24" font-weight="700" letter-spacing="4" font-family="IBM Plex Sans, sans-serif">CLI PATH</text>
  <text x="84" y="178" fill="#1A2340" font-size="58" font-weight="700" font-family="Space Grotesk, sans-serif">Three public command surfaces</text>
  <rect x="84" y="246" width="1032" height="128" rx="30" fill="#FFF9F0" stroke="#E0CBA7"/>
  <text x="118" y="298" fill="#A56A24" font-size="20" font-weight="700" letter-spacing="3" font-family="IBM Plex Sans, sans-serif">VALIDATE</text>
  <text x="118" y="344" fill="#1B2746" font-size="36" font-weight="700" font-family="IBM Plex Mono, monospace">dce validate contract.yml</text>
  <text x="760" y="344" fill="#5F6576" font-size="24" font-family="IBM Plex Sans, sans-serif">schema-only · sample-size · strict · json</text>
  <rect x="84" y="420" width="1032" height="128" rx="30" fill="#F5F8FB" stroke="#C9D8E6"/>
  <text x="118" y="472" fill="#2F6E95" font-size="20" font-weight="700" letter-spacing="3" font-family="IBM Plex Sans, sans-serif">INIT</text>
  <text x="118" y="518" fill="#1B2746" font-size="34" font-weight="700" font-family="IBM Plex Mono, monospace">dce init &lt;catalog&gt; --namespace analytics --table events</text>
  <rect x="84" y="594" width="1032" height="128" rx="30" fill="#F7FBF6" stroke="#C6D8C9"/>
  <text x="118" y="646" fill="#3A6C49" font-size="20" font-weight="700" letter-spacing="3" font-family="IBM Plex Sans, sans-serif">CHECK</text>
  <text x="118" y="692" fill="#1B2746" font-size="36" font-weight="700" font-family="IBM Plex Mono, monospace">dce check contract.yml</text>
  <text x="84" y="792" fill="#5F6576" font-size="28" font-family="IBM Plex Sans, sans-serif">The public CLI already covers validation, generation, and syntax checks without hiding the workflow behind a separate UI.</text>
</svg>