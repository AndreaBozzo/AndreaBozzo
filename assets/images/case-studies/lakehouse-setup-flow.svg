<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <rect width="1200" height="900" rx="40" fill="#F4ECE0"/>
  <rect x="48" y="48" width="1104" height="804" rx="34" fill="#FBF7F1" stroke="#DCCDB8" stroke-width="2"/>
  <text x="84" y="110" fill="#1E2B4A" font-size="24" font-weight="700" letter-spacing="4" font-family="IBM Plex Sans, sans-serif">BOOTSTRAP FLOW</text>
  <text x="84" y="172" fill="#1A2340" font-size="52" font-weight="700" font-family="Space Grotesk, sans-serif">
    <tspan x="84" dy="0">Small-team lakehouse,</tspan>
    <tspan x="84" dy="56">staged in four moves</tspan>
  </text>
  <rect x="90" y="262" width="220" height="122" rx="28" fill="#FFF9F0" stroke="#E0CBA7"/>
  <text x="120" y="316" fill="#A56A24" font-size="18" font-weight="700" letter-spacing="3" font-family="IBM Plex Sans, sans-serif">STEP 1</text>
  <text x="120" y="360" fill="#1B2746" font-size="28" font-weight="700" font-family="IBM Plex Mono, monospace">python -m venv .venv</text>
  <rect x="350" y="262" width="250" height="122" rx="28" fill="#F5F8FB" stroke="#C9D8E6"/>
  <text x="380" y="316" fill="#2F6E95" font-size="18" font-weight="700" letter-spacing="3" font-family="IBM Plex Sans, sans-serif">STEP 2</text>
  <text x="380" y="350" fill="#1B2746" font-size="21" font-weight="700" font-family="IBM Plex Mono, monospace">
    <tspan x="380" dy="0">pip install -r</tspan>
    <tspan x="380" dy="28">requirements.txt</tspan>
  </text>
  <rect x="640" y="262" width="240" height="122" rx="28" fill="#F7FBF6" stroke="#C6D8C9"/>
  <text x="670" y="316" fill="#3A6C49" font-size="18" font-weight="700" letter-spacing="3" font-family="IBM Plex Sans, sans-serif">STEP 3</text>
  <text x="670" y="360" fill="#1B2746" font-size="24" font-weight="700" font-family="IBM Plex Mono, monospace">docker-compose up -d</text>
  <rect x="920" y="262" width="190" height="122" rx="28" fill="#FFF3EE" stroke="#E0C0B5"/>
  <text x="950" y="316" fill="#9C5E49" font-size="18" font-weight="700" letter-spacing="3" font-family="IBM Plex Sans, sans-serif">STEP 4</text>
  <text x="950" y="360" fill="#1B2746" font-size="28" font-weight="700" font-family="IBM Plex Mono, monospace">dbt run</text>
  <path d="M310 323H346" stroke="#C79A57" stroke-width="8" stroke-linecap="round"/><path d="M600 323H636" stroke="#7BA3BF" stroke-width="8" stroke-linecap="round"/><path d="M880 323H916" stroke="#8BB59A" stroke-width="8" stroke-linecap="round"/>
  <rect x="90" y="484" width="1020" height="274" rx="34" fill="#FFF9F0" stroke="#E0CBA7"/>
  <text x="126" y="546" fill="#1A2340" font-size="36" font-weight="700" font-family="Space Grotesk, sans-serif">Service surface</text>
  <rect x="126" y="592" width="280" height="108" rx="24" fill="#FBF7F1" stroke="#DCCDB8"/>
  <text x="156" y="642" fill="#1B2746" font-size="28" font-weight="700" font-family="IBM Plex Sans, sans-serif">MinIO console</text>
  <text x="156" y="680" fill="#5F6576" font-size="24" font-family="IBM Plex Mono, monospace">:9001</text>
  <rect x="460" y="592" width="280" height="108" rx="24" fill="#FBF7F1" stroke="#DCCDB8"/>
  <text x="490" y="642" fill="#1B2746" font-size="28" font-weight="700" font-family="IBM Plex Sans, sans-serif">Superset</text>
  <text x="490" y="680" fill="#5F6576" font-size="24" font-family="IBM Plex Mono, monospace">:8088</text>
  <rect x="794" y="592" width="280" height="108" rx="24" fill="#FBF7F1" stroke="#DCCDB8"/>
  <text x="824" y="642" fill="#1B2746" font-size="28" font-weight="700" font-family="IBM Plex Sans, sans-serif">Example pipeline</text>
  <text x="824" y="670" fill="#5F6576" font-size="18" font-family="IBM Plex Mono, monospace">
    <tspan x="824" dy="0">python</tspan>
    <tspan x="824" dy="24">dlt/pipelines/example_api.py</tspan>
