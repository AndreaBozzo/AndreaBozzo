<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <rect width="1200" height="900" rx="40" fill="#F4ECE0"/>
  <rect x="44" y="44" width="1112" height="812" rx="34" fill="#FBF7F1" stroke="#DCCDB8" stroke-width="2"/>
  <text x="84" y="110" fill="#1E2B4A" font-size="24" font-weight="700" letter-spacing="4" font-family="IBM Plex Sans, sans-serif">CONNECTOR SURFACE</text>
  <text x="84" y="166" fill="#1A2340" font-size="48" font-weight="700" font-family="Space Grotesk, sans-serif">
    <tspan x="84" dy="0">One ingress shape,</tspan>
    <tspan x="84" dy="50">five real-time entry points</tspan>
  </text>
  <text x="84" y="258" fill="#5F6576" font-size="21" font-family="IBM Plex Sans, sans-serif">
    <tspan x="84" dy="0">Nephtys keeps the connector edge diverse while</tspan>
    <tspan x="84" dy="24">preserving one durable event contract downstream.</tspan>
  </text>
  <rect x="466" y="320" width="268" height="264" rx="36" fill="#1E2B4A"/>
  <text x="528" y="402" fill="#F7F3EA" font-size="42" font-weight="700" font-family="Space Grotesk, sans-serif">JetStream</text>
  <text x="548" y="446" fill="#D5DCE7" font-size="22" font-family="IBM Plex Sans, sans-serif">events + configs</text>
  <text x="496" y="518" fill="#E4B66C" font-size="18" letter-spacing="2" font-family="IBM Plex Sans, sans-serif">FILTER → TRANSFORM → DEDUP</text>
  <rect x="114" y="320" width="210" height="86" rx="24" fill="#EFF5FB" stroke="#C5D7E7"/><text x="154" y="372" fill="#23476A" font-size="30" font-weight="700" font-family="Space Grotesk, sans-serif">WebSocket</text>
  <rect x="114" y="446" width="210" height="86" rx="24" fill="#F7FBF6" stroke="#C6D8C9"/><text x="190" y="498" fill="#3A6C49" font-size="30" font-weight="700" font-family="Space Grotesk, sans-serif">SSE</text>
  <rect x="114" y="572" width="210" height="86" rx="24" fill="#FFF8EC" stroke="#E0CBA7"/><text x="183" y="624" fill="#A56A24" font-size="30" font-weight="700" font-family="Space Grotesk, sans-serif">REST</text>
  <rect x="876" y="320" width="210" height="86" rx="24" fill="#FFF3EE" stroke="#E0C0B5"/><text x="920" y="372" fill="#9C5E49" font-size="30" font-weight="700" font-family="Space Grotesk, sans-serif">Webhook</text>
  <rect x="876" y="446" width="210" height="86" rx="24" fill="#F1F0FB" stroke="#CEC9E7"/><text x="952" y="498" fill="#57518D" font-size="30" font-weight="700" font-family="Space Grotesk, sans-serif">gRPC</text>
  <path d="M324 363C392 363 394 362 454 404" stroke="#7BA3BF" stroke-width="8" stroke-linecap="round"/>
  <path d="M324 489C392 489 394 488 454 444" stroke="#8BB59A" stroke-width="8" stroke-linecap="round"/>
  <path d="M324 615C392 615 394 614 454 484" stroke="#D19F59" stroke-width="8" stroke-linecap="round"/>
  <path d="M734 404C790 362 792 363 876 363" stroke="#D9B17A" stroke-width="8" stroke-linecap="round"/>
  <path d="M734 444C790 488 792 489 876 489" stroke="#9B87C8" stroke-width="8" stroke-linecap="round"/>
  <rect x="112" y="720" width="974" height="92" rx="24" fill="#FFF9F0" stroke="#DCCDB8"/>
  <text x="148" y="764" fill="#5F6576" font-size="23" font-family="IBM Plex Sans, sans-serif">
    <tspan x="148" dy="0">Configurable through the REST API, with one pipeline shape</tspan>
    <tspan x="148" dy="26">regardless of whether the source is push- or pull-based.</tspan>
  </text>
</svg>